name: Copilot review gate

# Publishes a commit status named "Copilot review" on every PR head SHA.
#
# State machine (per CEO policy in DEE-113):
#   - pending  → no review yet from copilot-pull-request-reviewer[bot] on the
#                current head SHA; merge button stays disabled by branch
#                protection.
#   - success  → Copilot has posted a review (any state) for the current head
#                SHA; the wait gate is satisfied and the PR can merge once the
#                other required checks pass.
#
# Why "any state" and not "APPROVED": copilot-pull-request-reviewer[bot]
# leaves COMMENTED reviews — it does not APPROVE. CEO standard #1 in
# DEE-113 says "wait for the Copilot review to post"; that is the gate we
# enforce here. Resolving Copilot threads remains the author agent's job
# per CEO standard #2 (revise loop) — that is enforced via SOP, not via
# this status check.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  publish-status:
    runs-on: ubuntu-22.04
    steps:
      - name: Publish Copilot review status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('Workflow triggered without a pull_request payload.');
              return;
            }

            const sha = pr.head.sha;
            const COPILOT_LOGIN = 'copilot-pull-request-reviewer[bot]';

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              },
            );

            const copilotReviewOnHead = reviews.find(
              (r) =>
                r.user &&
                r.user.login === COPILOT_LOGIN &&
                r.commit_id === sha,
            );

            const state = copilotReviewOnHead ? 'success' : 'pending';
            const description = copilotReviewOnHead
              ? `Copilot review posted (${copilotReviewOnHead.state})`
              : 'Waiting for Copilot review on current head';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'Copilot review',
              description,
              target_url: pr.html_url,
            });

            core.info(`Posted "Copilot review" = ${state} on ${sha}`);
