# LICENSE.yml — main/util/
#
# Per-folder vendored-asset metadata for FR-02 / ADR-008 (deepnest-next).
# Schema: top-level array of entry maps, one per third-party / vendored item.
# Required fields: path, name, license (SPDX ID), copyright, upstream_url.
# Optional fields: notes.
#
# `path` is relative to this LICENSE.yml's folder (i.e. relative to main/util/).
# Story 2.2's `scripts/build-licenses.mjs` parses this shape and regenerates
# `LICENSES.md`. Story 2.3 wires the determinism check into `npm test`.
# Line endings: LF only (ADR-008 generator is Linux-only-CI).
# Vendored utilities here are listed in project-context.md §16.5 (do NOT modify
# their source); _unused/ entries are preserved per project-context §17 (ADR-007
# §revertibility).

- path: clipper.js
  name: Clipper Library (JavaScript port)
  license: BSL-1.0
  copyright: "Copyright 2010-2014 Angus Johnson; JavaScript port by Timo (2016); bundles JSBN BigInteger by Tom Wu (2005-2009)"
  upstream_url: https://sourceforge.net/projects/jsclipper/
  notes: "Boost Software License — full attribution preserved in source header. Vendored utility (project-context.md §16.5 — do not modify)."

